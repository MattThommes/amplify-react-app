name: Test Nightly Action

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]
  schedule:
    - cron: 0 5 * * *

jobs:
  test-job:
    timeout-minutes: 5
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: lts/*

      - name: Configure git for HTTPS access to private deps
        run: |
          git config --global url."https://github.com/".insteadOf ssh://git@github.com/
          git config --global url."https://github.com/".insteadOf git@github.com:
          echo "//github.com/:_authToken=${{ github.token }}" >> ~/.npmrc
          git config --global http.https://github.com/.extraheader "AUTHORIZATION: basic $(echo -n 'x-access-token:${{ github.token }}' | base64)"

      - name: Remove package-lock.json
        run: rm -f package-lock.json

      - name: Install dependencies
        run: |
          npm install --legacy-peer-deps

      - name: Build
        run: npm run build
